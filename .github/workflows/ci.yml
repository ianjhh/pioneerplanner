name: Comprehensive CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-backend:
    name: Backend API & AI Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Verify Python Code Syntax
      run: |
        python -m py_compile main.py retrieval.py chat.py peoplesoft_scraper.py mcp_server.py test_ragas.py
        
    - name: Run Backend API Tests
      run: |
        python -m unittest test_api.py
        
    - name: Run Ragas Golden Set Evaluation Stub
      run: |
        python -m unittest test_ragas.py

  build-frontend:
    name: Frontend React Build & Verification
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Build React Application
      run: |
        cd frontend
        npm run build

  validate-infrastructure:
    name: K8s & Docker Config Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate Docker Compose File
      run: |
        docker compose config
        
    - name: Validate Kubernetes YAML Files
      run: |
        python -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('k8s/*.yaml')]"
